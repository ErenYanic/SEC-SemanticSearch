# ──────────────────────────────────────────────────────────────────────
# nginx.conf — Reverse proxy for SEC Semantic Search
#
# Routes:
#   /api/*  → api:8000   (FastAPI REST endpoints)
#   /ws/*   → api:8000   (WebSocket connections, with upgrade)
#   /*      → frontend:3000 (Next.js application)
#
# TLS: To enable HTTPS, uncomment the TLS server block below and mount
# certificates via docker-compose volumes.  The HTTP block will then
# redirect all traffic to HTTPS.
# ──────────────────────────────────────────────────────────────────────

upstream api_backend {
    server api:8000;
}

upstream frontend_app {
    server frontend:3000;
}

# ── HTTP server ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API routes ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — ingest can be long-running
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── WebSocket routes ─────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket idle timeout (10 minutes; heartbeats keep it alive)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Frontend (everything else) ───────────────────────────────────
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


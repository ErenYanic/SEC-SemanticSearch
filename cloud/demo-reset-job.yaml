# ──────────────────────────────────────────────────────────────────────
# demo-reset-job.yaml — Cloud Run Job for nightly demo data reset
#
# This job clears all ingested data (ChromaDB + SQLite) so the demo
# deployment starts fresh each day. Designed to be triggered by
# Cloud Scheduler at midnight UTC.
#
# Setup:
#   1. Deploy the job:
#        gcloud run jobs replace cloud/demo-reset-job.yaml \
#          --region=REGION
#
#   2. Create Cloud Scheduler trigger:
#        gcloud scheduler jobs create http sec-search-demo-reset \
#          --location=REGION \
#          --schedule="0 0 * * *" \
#          --time-zone="UTC" \
#          --uri="https://REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/PROJECT_ID/jobs/sec-search-demo-reset:run" \
#          --http-method=POST \
#          --oauth-service-account-email=sec-search-sa@PROJECT_ID.iam.gserviceaccount.com
#
# The job mounts the same GCS FUSE bucket as the API service and
# removes the data directories. The API service recreates them on
# next startup (ChromaDB get_or_create_collection, SQLite CREATE IF
# NOT EXISTS).
#
# Only used when DEMO_MODE=true (Scenario C).
#
# See docs/DEPLOYMENT.md §4.6 for demo mode design.
# ──────────────────────────────────────────────────────────────────────

apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: sec-search-demo-reset
  labels:
    app: sec-semantic-search
    component: demo-reset
  annotations:
    run.googleapis.com/description: >-
      Nightly data reset for SEC Semantic Search demo deployment.
      Clears ChromaDB and SQLite data from the shared GCS bucket.
    run.googleapis.com/launch-stage: BETA

spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2

    spec:
      template:
        spec:
          serviceAccountName: sec-search-sa@PROJECT_ID.iam.gserviceaccount.com
          maxRetries: 1
          timeoutSeconds: 300

          containers:
            - image: alpine:3.21
              name: reset

              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Demo reset starting..."

                  # Clear ChromaDB data
                  if [ -d /app/data/chroma_db ]; then
                      rm -rf /app/data/chroma_db/*
                      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Cleared ChromaDB: /app/data/chroma_db"
                  else
                      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] ChromaDB directory not found (already clean)"
                  fi

                  # Clear SQLite metadata
                  if [ -f /app/data/sqlite/metadata.sqlite ]; then
                      rm -f /app/data/sqlite/metadata.sqlite
                      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Cleared SQLite: /app/data/sqlite/metadata.sqlite"
                  else
                      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] SQLite file not found (already clean)"
                  fi

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Demo reset complete."

              resources:
                limits:
                  cpu: "1"
                  memory: 512Mi

              volumeMounts:
                - name: data-volume
                  mountPath: /app/data

          volumes:
            - name: data-volume
              csi:
                driver: gcsfuse.run.googleapis.com
                readOnly: false
                volumeAttributes:
                  bucketName: PROJECT_ID-sec-search-data

# ──────────────────────────────────────────────────────────────────────
# frontend-service.yaml — Cloud Run service for SEC Search frontend
#
# Deploy:
#   gcloud run services replace cloud/frontend-service.yaml \
#     --region=REGION
#
# The frontend is a stateless Next.js standalone server. It proxies
# admin routes to the API service via INTERNAL_API_BASE_URL. The
# ADMIN_API_KEY is server-only — Next.js route handlers inject it
# when forwarding admin requests; it never reaches the browser (AD#49).
#
# Cloud Run provides TLS termination — no nginx reverse proxy needed.
#
# See docs/DEPLOYMENT.md for full configuration reference.
# ──────────────────────────────────────────────────────────────────────

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sec-search-frontend
  labels:
    app: sec-semantic-search
    component: frontend
  annotations:
    run.googleapis.com/description: >-
      SEC Semantic Search Frontend — Next.js React application for
      semantic search over SEC filings.

spec:
  template:
    metadata:
      annotations:
        # Stateless — can scale freely.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"

    spec:
      containerConcurrency: 80
      timeoutSeconds: 300

      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/sec-search/frontend:latest
          name: frontend

          ports:
            - containerPort: 3000
              name: http1

          resources:
            limits:
              cpu: "1"
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          env:
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"

            # API service URL — replace after deploying the API service.
            - name: INTERNAL_API_BASE_URL
              value: "https://sec-search-api-PROJECT_HASH.REGION.run.app"

            # Server-only admin key for Next.js route handlers (AD#49).
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: sec-search-admin-key
